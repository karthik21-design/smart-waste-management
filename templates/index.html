<!DOCTYPE html>
<html>
<head>
  <title>Smart Waste Management</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial; background: #1a1a2e; color: white; margin: 0; padding: 20px; }
    nav { background: #16213e; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
    nav h2 { margin: 0; color: #00b4d8; }
    .stats { display: flex; gap: 15px; margin-bottom: 20px; }
    .card { background: #16213e; padding: 20px; border-radius: 8px; flex: 1; text-align: center; }
    .card h3 { margin: 0; font-size: 2em; color: #00b4d8; }
    .bins { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
    .bin-card { background: #16213e; padding: 15px; border-radius: 8px; }
    .bin-card h3 { margin: 0 0 10px 0; }
    .bar-bg { background: #333; border-radius: 5px; height: 20px; margin: 10px 0; }
    .bar-fill { height: 20px; border-radius: 5px; transition: width 0.5s; display: flex; align-items: center; padding-left: 8px; font-size: 12px; }
    .safe { background: #2d6a4f; }
    .warning { background: #e9c46a; color: black; }
    .danger { background: #e63946; }
    button { background: #00b4d8; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 10px 0; }
    button:hover { background: #0096c7; }
  </style>
</head>
<body>
  <nav>
    <h2>🗑️ Smart Waste Management</h2>
  </nav>

  <div class="stats">
    <div class="card">
      <h3 id="total">0</h3>
      <p>Total Bins</p>
    </div>
    <div class="card">
      <h3 id="full" style="color:#e63946">0</h3>
      <p>Need Collection</p>
    </div>
    <div class="card">
      <h3 id="ok" style="color:#2d6a4f">0</h3>
      <p>OK Bins</p>
    </div>
  </div>

 <button onclick="loadBins()">🔄 Refresh</button>
<button onclick="simulate()" style="background:#e63946">⚡ Simulate Sensors</button>
<div id="alerts-section" style="margin: 20px 0;">
    <h2 style="color:#e63946">🔔 Alerts — Bins Need Collection</h2>
    <div id="alerts"></div>
</div>
<div style="background:#16213e; padding:20px; border-radius:8px; margin:20px 0;">
    <h2 style="color:#00b4d8">📊 Bin Fill Levels</h2>
    <canvas id="fillChart" height="100"></canvas>
</div>
  <div class="bins" id="bins"></div>

  <script>
    async function sendChat() {
    const input = document.getElementById('chat-input');
    const messages = document.getElementById('chat-messages');
    const question = input.value.trim();
    
    if(!question) return;
    
    messages.innerHTML += `
        <div style="text-align:right; margin:5px 0;">
            <span style="background:#00b4d8; padding:5px 10px; border-radius:10px;">
                ${question}
            </span>
        </div>`;
    
    input.value = '';
    messages.innerHTML += `<div id="typing">🤖 Thinking...</div>`;
    messages.scrollTop = messages.scrollHeight;
    
    const res = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({question})
    });
    
    const data = await res.json();
    document.getElementById('typing').remove();
    
    messages.innerHTML += `
        <div style="text-align:left; margin:5px 0;">
            <span style="background:#16213e; border:1px solid #00b4d8; padding:5px 10px; border-radius:10px;">
                🤖 ${data.answer}
            </span>
        </div>`;
    messages.scrollTop = messages.scrollHeight;
}

document.getElementById('chat-input').addEventListener('keypress', function(e) {
    if(e.key === 'Enter') sendChat();
});
    let fillChart = null;

async function loadChart() {
    const res = await fetch('/bins');
    const bins = await res.json();
    
    const labels = bins.map(b => b.bin_name);
    const data = bins.map(b => b.fill_level || 0);
    const colors = data.map(d => 
        d >= 80 ? '#e63946' : 
        d >= 50 ? '#e9c46a' : '#2d6a4f'
    );

    if(fillChart) {
        fillChart.data.datasets[0].data = data;
        fillChart.data.datasets[0].backgroundColor = colors;
        fillChart.update();
        return;
    }

    const ctx = document.getElementById('fillChart').getContext('2d');
    fillChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Fill Level %',
                data: data,
                backgroundColor: colors,
                borderRadius: 5
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true,
                    max: 100,
                    ticks: { color: 'white' },
                    grid: { color: '#333' }
                },
                x: {
                    ticks: { color: 'white' },
                    grid: { color: '#333' }
                }
            },
            plugins: {
                legend: { labels: { color: 'white' } }
            }
        }
    });
}
    async function loadAlerts() {
    const res = await fetch('/alerts');
    const alerts = await res.json();
    
    if(alerts.length === 0) {
        document.getElementById('alerts').innerHTML = 
            '<p style="color:#2d6a4f">✅ All bins are OK!</p>';
        return;
    }
    
    document.getElementById('alerts').innerHTML = alerts.map(a => `
        <div style="background:#e63946; padding:10px; border-radius:8px; margin:5px 0;">
            🚨 <b>${a.bin_name}</b> at ${a.location} is <b>${a.fill_level}%</b> full — needs collection!
        </div>
    `).join('');
}
    async function simulate() {
    await fetch('/simulate');
    loadBins();
}
    async function loadBins() {
      const res = await fetch('/bins');
      const bins = await res.json();

      document.getElementById('total').textContent = bins.length;
      document.getElementById('full').textContent = bins.filter(b => (b.fill_level || 0) >= 80).length;
      document.getElementById('ok').textContent = bins.filter(b => (b.fill_level || 0) < 80).length;

      document.getElementById('bins').innerHTML = bins.map(b => {
        const level = b.fill_level || 0;
        const color = level >= 80 ? 'danger' : level >= 50 ? 'warning' : 'safe';
        return `
          <div class="bin-card">
            <h3>${b.bin_name}</h3>
            <p>📍 ${b.location}</p>
            <p>🗑️ ${b.bin_type}</p>
            <div class="bar-bg">
              <div class="bar-fill ${color}" style="width:${level}%">${level}%</div>
            </div>
          </div>`;
      }).join('');
    }
    loadChart();
  setInterval(loadChart, 10000);
  loadAlerts();
  setInterval(loadAlerts, 10000);
    loadBins();
    setInterval(loadBins, 10000);
  </script>
 

  <div style="background:#16213e; padding:20px; border-radius:8px; margin:20px 0;">
    <h2 style="color:#00b4d8">🤖 AI Waste Assistant</h2>
    <div id="chat-messages" style="height:200px; overflow-y:auto; margin-bottom:10px; padding:10px; background:#0d1117; border-radius:8px;"></div>
    <div style="display:flex; gap:10px;">
        <input id="chat-input" type="text" placeholder="Ask about bins..." 
            style="flex:1; padding:10px; border-radius:5px; border:none; background:#333; color:white;">
        <button onclick="sendChat()">Send 🚀</button>
    </div>
  </div>
</body>
</html>
